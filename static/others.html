    var maxSpeed = 40;
var deadZone = 0.05;

var inputCheck = setInterval(function () {
    wiiu.gamepad.update();

    var dx = wiiu.gamepad.lStickX;
    var dy = wiiu.gamepad.lStickY;

    if ((dx !== 0 && dy !== 0) || wiiu.gamepad.tpTouch === 1) {
        vino.navi_reset();
    }

    var movedX = Math.abs(dx) > deadZone;
    var movedY = Math.abs(dy) > deadZone;

    if (!movedX && !movedY) return;

    var sx = movedX ? dx * maxSpeed : 0;
    var sy = movedY ? -dy * maxSpeed : 0; // invert Y

    window.scrollBy(sx, sy);
}, 16);

window.addEventListener(
    "focus",
    function (e) {
        var el = e.target;
        var rectStr = vino.navi_getRect();
        if (!el || !rectStr) return;

        // Parse rect from Wii U API
        var parts = rectStr.split(",");
        if (parts.length < 4) return;

        var naviRect = {
            left: parseInt(parts[0], 10),
            top: parseInt(parts[1], 10),
            width: parseInt(parts[2], 10),
            height: parseInt(parts[3], 10)
        };
        naviRect.right = naviRect.left + naviRect.width;
        naviRect.bottom = naviRect.top + naviRect.height;

        // Viewport bounds
        var viewTop = 0;
        var viewLeft = 0;
        var viewRight = window.innerWidth;
        var viewBottom = window.innerHeight;

        var scrollX = 0;
        var scrollY = 0;

        // --- Vertical scrolling ---
        if (naviRect.top < viewTop) {
            // Align top
            scrollY = naviRect.top - viewTop;
        } else if (naviRect.bottom > viewBottom) {
            if (naviRect.height > window.innerHeight) {
                scrollY = naviRect.top - viewTop;
            } else {
                scrollY = naviRect.bottom - viewBottom;
            }
        }

        // --- Horizontal scrolling ---
        if (naviRect.left < viewLeft) {
            scrollX = naviRect.left - viewLeft;
        } else if (naviRect.right > viewRight) {
            if (naviRect.width > window.innerWidth) {
                scrollX = naviRect.left - viewLeft;
            } else {
                scrollX = naviRect.right - viewRight;
            }
        }

        if (scrollX !== 0 || scrollY !== 0) {
            window.scrollBy(scrollX, scrollY);
        }
    },
    true
);

    function getUserName() {

    function getLanguage() {
      var lang = vino.info_getLanguage();
      switch (lang.toLowerCase()) {
        case "jp":
          return "ja";
        case "sp":
          return "es";
        case "ge":
          return "de";
        case "du":
          return "nl";
        case "po":
          return "pt";
        default:
          return lang.toLowerCase();
      }
    }

    var lang = getLanguage();

    function voteText(voted) {
      if (voted === "tvii") return 'Nintendo TVii';
      if (voted === "miiverse") return 'Roseverse';
      return votedResponseBoth[lang] || votedResponseBoth.en;
    }

    var countLabelOne = document.querySelector("#votes-count-tvii span:nth-child(1)");

    var countLabelTwo = document.querySelector("#votes-count-miiverse span:nth-child(1)");

    var countLabelThree = document.querySelector("#votes-count-all span:nth-child(1)");


    var countLabelFour = document.querySelector("#votes-count-both span:nth-child(1)");

    countLabelOne.innerHTML = voteTotalLabelTVii[lang] || voteTotalLabelTVii.en;
    countLabelTwo.innerHTML = voteTotalLabelMiiverse[lang] || voteTotalLabelMiiverse.en;
    countLabelThree.innerHTML = voteTotalLabelAll[lang] || voteTotalLabelAll.en;
    countLabelFour.innerHTML = voteTotalLabelBoth[lang] || voteTotalLabelBoth.en;

    var viewerButton = document.querySelectorAll(".button.return-from-viewer");
    var titleFriends = document.querySelector("#voted-title-friends");
    var titleAll = document.querySelector("#voted-title-others");

    for (var x = 0; x < viewerButton.length; x++) {
      viewerButton[x].innerHTML = votedReturn[lang] || votedReturn.en;
      viewerButton[x].addEventListener("click", function() {
        this.focus();
        if (!vino.navi_getRect()) {
          vino.lyt_startTouchEffect();
        }
        vino.navi_setToFocused(true);
        vino.soundPlayVolume("SE_WAVE_OK_SUB", 30);
        vino.navi_decide();
      })
    }

    titleAll.innerHTML = votedAll[lang] || votedAll.en;
    titleFriends.innerHTML = votedFriends[lang] || votedFriends.en;

    function createVoterDiv(user) {
      if (document.getElementById("voter-" + user.pid)) {
        return null;
      }
      var div = document.createElement('div');
      if (user.pid === vino.act_getPid(slotNo)) {
        div.className = 'voter myself';
      } else {
        div.className = 'voter';
      }
      div.id = "voter-" + user.pid;
      div.setAttribute("tabindex", "0")
      div.setAttribute("navi_target", "");

      var img = document.createElement('img');
      img.className = 'mii';
      img.src = '/img/mii?pid=' + user.pid;

      img.addEventListener("click", function() {
        vino.soundPlayVolume("SE_WORD_MII", 40);
      })

      var p = document.createElement('p');
      p.innerHTML = user.mii_name;

      var h1 = document.createElement('h1');
      h1.innerHTML = votedLabel[lang] || votedLabel.en;

      var h2 = document.createElement('h2');
      h2.innerHTML = voteText(user.prefers);

      div.appendChild(img);
      div.appendChild(p);
      div.appendChild(h1);
      div.appendChild(h2);

      return div;
    }

    function xhrGet(url, cb) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          cb(JSON.parse(xhr.responseText));
        }
      };
      xhr.send(null);
    }

    function loadFriendsVotes(callback) {
      var container = document.querySelector('.people-voters.friends');
      var friends = vino.fp_getFriendList();

      if (!friends) {
        titleFriends.innerHTML = noFriendsVoted[lang] || noFriendsVoted.en;
        if (callback) callback(); // continue
        return;
      }

      var pids = friends.split(',');
      var url = '/v1/rose/analytics/get?type=friend';

      for (var i = 0; i < pids.length; i++) {
        url += '&pid=' + pids[i].replace(/\s/g, '');
      }

      xhrGet(url, function(data) {
        if (!data || !data.length) {
          titleFriends.innerHTML = noFriendsVoted[lang] || noFriendsVoted.en;
        } else {
          for (var i = 0; i < data.length; i++) {
            var div = createVoterDiv(data[i]);
            if (div) container.appendChild(div); // only append if div exists
          }
        }

        if (callback) callback(); // call next step
      });
    }

    function loadOtherVotes(callback) {
      var container = document.querySelector('.people-voters.others');
      var url = '/v1/rose/analytics/get?type=all&limit=100';

      xhrGet(url, function(data) {
        if (!data || !data.length) return;

        for (var i = 0; i < data.length; i++) {
          var div = createVoterDiv(data[i]);
          if (div) container.appendChild(div); // skip duplicates
        }

        if (callback) callback(); // call next step
      });
    }

    function loadVotesCount(callback) {
      var container = document.querySelector('.vote-count');
      var url = '/v1/rose/analytics/count';

      xhrGet(url, function(data) {
        if (!data) return;

        container.querySelector("#votes-count-miiverse span:nth-child(2)").innerText = data.miiverse;
        container.querySelector("#votes-count-tvii span:nth-child(2)").innerText = data.tvii;
        container.querySelector("#votes-count-all span:nth-child(2)").innerText = data.tvii + data.miiverse + data.all;
        container.querySelector("#votes-count-both span:nth-child(2)").innerText = data.all;

        if (callback) callback(); // call next step
      });
    }

    loadVotesCount(function() {
      loadFriendsVotes(function() {
        loadOtherVotes();
      });
    })

    setTimeout(function() {
      vino.requestGarbageCollect();
    }, 100000);
